<p>title: Hexo 基本环境安装 安装</p>
<h1 id="Hexo-Centos7基本环境安装"><a href="#Hexo-Centos7基本环境安装" class="headerlink" title="Hexo Centos7基本环境安装"></a>Hexo Centos7基本环境安装</h1><h2 id=""><a href="#" class="headerlink" title=""></a></h2><h3 id="安装nodejs-cnpm"><a href="#安装nodejs-cnpm" class="headerlink" title="安装nodejs  cnpm"></a>安装nodejs  cnpm</h3><figure class="highlight shell"><table><tr><td class="gutter"><pre><span class="line">1</span><br><span class="line">2</span><br><span class="line">3</span><br><span class="line">4</span><br><span class="line">5</span><br><span class="line">6</span><br><span class="line">7</span><br><span class="line">8</span><br><span class="line">9</span><br><span class="line">10</span><br><span class="line">11</span><br><span class="line">12</span><br><span class="line">13</span><br><span class="line">14</span><br><span class="line">15</span><br><span class="line">16</span><br><span class="line">17</span><br><span class="line">18</span><br><span class="line">19</span><br><span class="line">20</span><br><span class="line">21</span><br><span class="line">22</span><br><span class="line">23</span><br></pre></td><td class="code"><pre><span class="line">-- 通过源码安装</span><br><span class="line">wget https://nodejs.org/dist/v16.14.0/node-v16.14.0-linux-x64.tar.gz</span><br><span class="line"></span><br><span class="line">-- 解压到当前文件夹</span><br><span class="line">tar -xvf node-v16.14.0-linux-x64.tar.gz # 将文件解压到当前目录</span><br><span class="line"></span><br><span class="line">- 创建物理路径</span><br><span class="line">mkdir -p /usr/local/nodejs</span><br><span class="line"></span><br><span class="line">-- 移动文件夹到指定位置</span><br><span class="line">mv node-v16.14.0-linux-x64/* /usr/local/nodejs/</span><br><span class="line"></span><br><span class="line">-- 将node 命令做全局映射（软链接）</span><br><span class="line">ln -s /usr/local/nodejs/bin/node /usr/local/bin/node</span><br><span class="line"></span><br><span class="line">-- 将npm 命令做全局映射（软链接）</span><br><span class="line">ln -s /usr/local/nodejs/bin/npm /usr/local/bin/npm</span><br><span class="line"></span><br><span class="line">-- 安装cnpm淘宝镜像 中国版npm （会默认下载到npm下的bin文件中）</span><br><span class="line">npm install -g cnpm --registry=&quot;https://registry.npm.taobao.org&quot;</span><br><span class="line"></span><br><span class="line">-- 将cnpm 软连接映射到全局</span><br><span class="line">ln -s /usr/local/nodejs/bin/cnpm /usr/local/bin/cnpm</span><br></pre></td></tr></table></figure>



<h3 id="安装git"><a href="#安装git" class="headerlink" title="安装git"></a>安装git</h3><figure class="highlight shell"><table><tr><td class="gutter"><pre><span class="line">1</span><br></pre></td><td class="code"><pre><span class="line">yum install git-core</span><br></pre></td></tr></table></figure>



<h3 id="git-设置"><a href="#git-设置" class="headerlink" title="git 设置"></a>git 设置</h3><figure class="highlight shell"><table><tr><td class="gutter"><pre><span class="line">1</span><br><span class="line">2</span><br><span class="line">3</span><br><span class="line">4</span><br><span class="line">5</span><br><span class="line">6</span><br><span class="line">7</span><br><span class="line">8</span><br><span class="line">9</span><br><span class="line">10</span><br><span class="line">11</span><br><span class="line">12</span><br><span class="line">13</span><br></pre></td><td class="code"><pre><span class="line">-- 首先是不管你使用哪个托管平台 要用那个托管平台的信息</span><br><span class="line">-- 设置 个人信息</span><br><span class="line">git config --global user.name &quot;yourname&quot;</span><br><span class="line">git config --global user.email &quot;youremail&quot;</span><br><span class="line">-- 检查个人信息是否正确</span><br><span class="line">git config user.name</span><br><span class="line">git config user.email</span><br><span class="line"></span><br><span class="line">--公钥秘钥</span><br><span class="line">ssh，简单来讲，就是一个秘钥，其中，id_rsa是你这台电脑的私人秘钥，不能给别人看的，id_rsa.pub是公共秘钥，可以随便给别人看。把这个公钥放在代码托管平台上（gitee/github）上，这样当你链接代码托管平台上（gitee/github）自己的账户时，它就会根据公钥匹配你的私钥，当能够相互匹配时，才能够顺利的通过git上传你的文件到代码托管平台上。</span><br><span class="line">--生成公钥秘钥 一路回车</span><br><span class="line">ssh-keygen -t rsa -C &quot;yangjiarui998@163.com&quot;</span><br><span class="line"></span><br></pre></td></tr></table></figure>



<h3 id="hexo-初始化"><a href="#hexo-初始化" class="headerlink" title="hexo 初始化"></a>hexo 初始化</h3><figure class="highlight shell"><table><tr><td class="gutter"><pre><span class="line">1</span><br><span class="line">2</span><br><span class="line">3</span><br><span class="line">4</span><br><span class="line">5</span><br><span class="line">6</span><br><span class="line">7</span><br><span class="line">8</span><br><span class="line">9</span><br><span class="line">10</span><br><span class="line">11</span><br><span class="line">12</span><br><span class="line">13</span><br><span class="line">14</span><br><span class="line">15</span><br><span class="line">16</span><br><span class="line">17</span><br><span class="line">18</span><br><span class="line">19</span><br><span class="line">20</span><br><span class="line">21</span><br><span class="line">22</span><br><span class="line">23</span><br><span class="line">24</span><br></pre></td><td class="code"><pre><span class="line">--创建一个hexo的文件夹</span><br><span class="line">mkdir hexo</span><br><span class="line"></span><br><span class="line">--到hexo目录下</span><br><span class="line">cd hexo</span><br><span class="line"></span><br><span class="line">--使用cnpm 安装一下hexo</span><br><span class="line">cnpm  install -g hexo-cli</span><br><span class="line"></span><br><span class="line">--初始化 hexo 并生成一个myblog文件</span><br><span class="line">hexo init myblog</span><br><span class="line"></span><br><span class="line">--使用国内的镜像为你完成博客的初始化工作</span><br><span class="line">cnpm install</span><br><span class="line"></span><br><span class="line">--初始化一个模板</span><br><span class="line">hexo g</span><br><span class="line"></span><br><span class="line">--清空缓存</span><br><span class="line">hexo cl</span><br><span class="line"></span><br><span class="line">-- s 是server 启动的意思  -p9000 指定端口访问</span><br><span class="line">hexo s -p 9000</span><br><span class="line"></span><br></pre></td></tr></table></figure>



<h3 id="hexo关联代码托管平台"><a href="#hexo关联代码托管平台" class="headerlink" title="hexo关联代码托管平台"></a>hexo关联代码托管平台</h3><figure class="highlight plaintext"><table><tr><td class="gutter"><pre><span class="line">1</span><br><span class="line">2</span><br><span class="line">3</span><br><span class="line">4</span><br><span class="line">5</span><br><span class="line">6</span><br><span class="line">7</span><br><span class="line">8</span><br><span class="line">9</span><br><span class="line">10</span><br><span class="line">11</span><br><span class="line">12</span><br><span class="line">13</span><br><span class="line">14</span><br><span class="line">15</span><br><span class="line">16</span><br><span class="line">17</span><br><span class="line">18</span><br><span class="line">19</span><br></pre></td><td class="code"><pre><span class="line">-- 进入hexo 生成的文件下找到_config.yml</span><br><span class="line">-- 目前我使用的是gihub  这个没什么限制 repo最好使用ssh的</span><br><span class="line">deploy:</span><br><span class="line">  type: git</span><br><span class="line">  repo: git@github.com:yangjiarui998/yangjiarui998.github.io.git</span><br><span class="line">  branch: main</span><br><span class="line"></span><br><span class="line">-- 这个时候需要先安装deploy-git ，也就是部署的命令,这样你才能用命令部署到GitHub</span><br><span class="line">cnpm install hexo-deployer-git --save</span><br><span class="line"></span><br><span class="line">-- hexo 发布</span><br><span class="line">hexo clean  #清楚缓存</span><br><span class="line"></span><br><span class="line">hexo generate #生成静态文章</span><br><span class="line"></span><br><span class="line">hexo deploy #部署</span><br><span class="line"></span><br><span class="line">https://yangjiarui998.github.io/    #访问</span><br><span class="line"></span><br></pre></td></tr></table></figure>

<script>
    function viewer_init() {
        let pswpElement = document.querySelectorAll('.pswp')[0];
        let $imgArr = document.querySelectorAll(('.article-entry img:not(.reward-img)'))

        $imgArr.forEach(($em, i) => {
            $em.onclick = () => {
                // slider展开状态
                // todo: 这样不好，后面改成状态
                if (document.querySelector('.left-col.show')) return
                let items = []
                $imgArr.forEach(($em2, i2) => {
                    let img = $em2.getAttribute('data-idx', i2)
                    let src = $em2.getAttribute('data-target') || $em2.getAttribute('src')
                    let title = $em2.getAttribute('alt')
                    // 获得原图尺寸
                    const image = new Image()
                    image.src = src
                    items.push({
                        src: src,
                        w: image.width || $em2.width,
                        h: image.height || $em2.height,
                        title: title
                    })
                })
                var gallery = new PhotoSwipe(pswpElement, PhotoSwipeUI_Default, items, {
                    index: parseInt(i)
                });
                gallery.init()
            }
        })
    }
    viewer_init()
</script>

      copyHtml += '<i class="ri-file-copy-2-line"></i><span>COPY</span>';

      $(".highlight .code pre").before(copyHtml);
      $(".article pre code").before(copyHtml);
      var clipboard = new ClipboardJS('.btn-copy', {
        target: function(trigger) {
          return trigger.nextElementSibling;
        }
      });
      clipboard.on('success', function(e) {
        let $btn = $(e.trigger);
        $btn.addClass('copied');
        let $icon = $($btn.find('i'));
        $icon.removeClass('ri-file-copy-2-line');
        $icon.addClass('ri-checkbox-circle-line');
        let $span = $($btn.find('span'));
        $span[0].innerText = 'COPIED';
        
        wait(function () { // 等待两秒钟后恢复
          $icon.removeClass('ri-checkbox-circle-line');
          $icon.addClass('ri-file-copy-2-line');
          $span[0].innerText = 'COPY';
        }, 2000);
      });
      clipboard.on('error', function(e) {
        e.clearSelection();
        let $btn = $(e.trigger);
        $btn.addClass('copy-failed');
        let $icon = $($btn.find('i'));
        $icon.removeClass('ri-file-copy-2-line');
        $icon.addClass('ri-time-line');
        let $span = $($btn.find('span'));
        $span[0].innerText = 'COPY FAILED';
        
        wait(function () { // 等待两秒钟后恢复
          $icon.removeClass('ri-time-line');
          $icon.addClass('ri-file-copy-2-line');
          $span[0].innerText = 'COPY';
        }, 2000);
      });
    }
    initCopyCode();
  }(window, document);
</script>
